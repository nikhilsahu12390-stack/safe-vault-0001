<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Safe Vault - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #121212; font-family: 'Poppins', sans-serif; }
        .card-container { display: flex; width: 850px; height: 500px; border-radius: 20px; box-shadow: 0 15px 35px rgba(212, 175, 55, 0.2); overflow: hidden; background: #ffffff; }
        .left-side { flex: 1; padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .input-group { margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 12px; background: linear-gradient(135deg, #d4af37, #f3e5ab, #d4af37); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; }
        .modal-content { background-color: #fff; padding: 30px; border-radius: 15px; width: 350px; text-align: center; border: 2px solid #d4af37; }
        .right-side { flex: 1; background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .safe-vault-text { font-family: 'Cinzel', serif; font-size: 45px; margin: 0; }
        .signup-link { margin-top: 15px; font-size: 13px; text-align: center; }
        .signup-link a { color: #d4af37; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="left-side">
            <h2>Secure Login</h2>
            <div class="input-group"><input type="email" id="loginEmail" placeholder="Email Address"></div>
            <div class="input-group"><input type="password" id="loginPass" placeholder="Password"></div>
            <button class="btn-gold" id="loginBtn">Login</button>
            <div class="signup-link">
                <a id="openForgotModal" style="color: #666;">Forgot Password?</a><br>
                New to Vault? <a id="openSignupModal">Sign up</a>
            </div>
        </div>
        <div class="right-side">
            <h1 class="safe-vault-text">SAFE<br>VAULT</h1>
        </div>
    </div>

    <!-- Signup Modal -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <span id="closeSignup" style="float:right; cursor:pointer;">&times;</span>
            <h3>Create Account</h3>
            <div id="signupFormSection">
                <input type="text" id="signupName" placeholder="Full Name" style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="email" id="signupEmail" placeholder="Email" style="width:100%; margin-bottom:10px; padding:10px;">
                <input type="password" id="signupPass" placeholder="Password" style="width:100%; margin-bottom:10px; padding:10px;">
                <button class="btn-gold" id="sendVerifyBtn">Verify & Create</button>
            </div>
            <div id="verificationStatus" style="display:none; color: green; font-weight: bold;">📩 Verification email sent! Please verify to finish.</div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal">
        <div class="modal-content">
            <span id="closeForgot" style="float:right; cursor:pointer;">&times;</span>
            <h3>Reset Password</h3>
            <input type="email" id="forgotEmail" placeholder="Enter your email" style="width:100%; margin-bottom:10px; padding:10px;">
            <button class="btn-gold" id="sendResetBtn">Send Reset Link</button>
        </div>
    </div>

    <script type="module">
        // Import only ONCE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Initialize Firebase
       // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyCjkkwyknkNvXbpq94StUUjWqANWkqZw8M",
  authDomain: "safe-vault-00001.firebaseapp.com",
  projectId: "safe-vault-00001",
  storageBucket: "safe-vault-00001.firebasestorage.app",
  messagingSenderId: "900024511097",
  appId: "1:900024511097:web:5be1911bc1f5e5d5a4c2a8"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Modals Logic
        document.getElementById("openSignupModal").onclick = () => document.getElementById("signupModal").style.display = "flex";
        document.getElementById("closeSignup").onclick = () => document.getElementById("signupModal").style.display = "none";
        document.getElementById("openForgotModal").onclick = () => document.getElementById("forgotModal").style.display = "flex";
        document.getElementById("closeForgot").onclick = () => document.getElementById("forgotModal").style.display = "none";

        // LOGIN LOGIC
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                if (!cred.user.emailVerified) {
                    alert("Access Denied: Please verify your email first.");
                    await auth.signOut();
                } else {
                    window.location.href = "dashboard.html";
                }
            } catch (e) { alert("Login Failed: " + e.message); }
        });

        // SIGNUP LOGIC (New Account Check)
        document.getElementById('sendVerifyBtn').addEventListener('click', async () => {
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPass').value;
            const name = document.getElementById('signupName').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await sendEmailVerification(cred.user);
                document.getElementById("signupFormSection").style.display = "none";
                document.getElementById("verificationStatus").style.display = "block";
                
                // Monitor verification
                const check = setInterval(async () => {
                    await cred.user.reload();
                    if (cred.user.emailVerified) {
                        clearInterval(check);
                        await setDoc(doc(db, "users", cred.user.uid), { name, email });
                        alert("Account created successfully!");
                        window.location.href = "dashboard.html";
                    }
                }, 3000);
            } catch (e) {
                if (e.code === 'auth/email-already-in-use') {
                    alert("Account already created for this email!");
                } else {
                    alert(e.message);
                }
            }
        });

        // FORGOT PASSWORD
        document.getElementById('sendResetBtn').addEventListener('click', async () => {
            const email = document.getElementById('forgotEmail').value;
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Reset link sent! Please check your inbox and update password.");
                document.getElementById("forgotModal").style.display = "none";
            } catch (e) { alert(e.message); }
        });
    </script>
</body>
</html>
