<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Shop Owner Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 20px; min-height: 100vh; }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        /* 3D Glassmorphism Login Box */
        .login-box {
            background: #1e293b;
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        
        /* Main Dashboard (Hidden by default) */
        .dashboard-view { display: none; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .input-field {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #334155; background: #0f172a;
            color: white; border-radius: 8px; font-size: 16px;
        }
        
        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }
        .btn-danger { background: #ef4444; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
        
        .link-box {
            background: #1e293b; padding: 15px; border-radius: 10px;
            margin-bottom: 20px; border-left: 5px solid #3b82f6;
        }
        
        /* Mobile Friendly Responsive Table Wrapper */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-top: 15px;
        }

        /* 3D Data Table */
        table {
            width: 100%; border-collapse: collapse;
            background: #1e293b; overflow: hidden;
        }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #3b82f6; font-weight: bold; }
        tr:hover { background: #273549; }
        
        /* Interactive Toggle Styles */
        .status-label {
            display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .status-checkbox {
            width: 18px; height: 18px; cursor: pointer; accent-color: #22c55e;
        }

        /* WhatsApp Small Icon Button */
        .btn-whatsapp {
            background: #22c55e; color: white; padding: 6px 12px; border-radius: 6px;
            font-size: 13px; text-decoration: none; margin-right: 10px; display: inline-flex;
            align-items: center; justify-content: center; font-weight: bold;
            box-shadow: 0 2px 5px rgba(34, 197, 94, 0.3);
        }
        .btn-whatsapp:hover { background: #16a34a; }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; text-align: center; gap: 15px; }
            th, td { padding: 12px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="login-screen" class="login-box">
            <h2>🔐 Owner Login</h2>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px;">Apna registered shop email aur password dalein.</p>
            <input type="email" id="login-email" class="input-field" placeholder="nikhil@gmail.com">
            <input type="password" id="login-pass" class="input-field" placeholder="******">
            <button id="btn-login" class="btn" style="width: 100%; margin-top: 10px;">Dashboard Kholo ➔</button>
        </div>

        <div id="dashboard-screen" class="dashboard-view">
            <div class="header">
                <div>
                    <h2 id="welcome-text">Dukan Dashboard</h2>
                    <p id="owner-email" style="color: #3b82f6; font-size: 14px; font-weight: bold;"></p>
                </div>
                <button id="btn-logout" class="btn btn-danger">Log Out 🚪</button>
            </div>

            <div class="link-box">
                <h4>🔗 Aapka Customer QR / Lucky Draw Link:</h4>
                <p id="shop-url" style="color: #a7f3d0; margin-top: 5px; font-family: monospace; font-size: 15px; word-break: break-all;"></p>
            </div>

            <div style="margin-top: 25px; margin-bottom: 5px;">
                <h3>🎁 Grahakon ke Jeete Hue Coupons</h3>
                <!-- Realtime Filtering Input Box -->
                <input type="text" id="search-input" class="input-field" placeholder="🔎 Mobile Number ya Coupon Code se search karein...">
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Mobile Number</th>
                            <th>Jeeta Hua Coupon</th>
                            <th>Tarikh aur Samay</th>
                            <th>Status Action</th>
                        </tr>
                    </thead>
                    <tbody id="data-rows">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrmVNSFa6mt1nJiY3kgkxHNYJyUWu625o",
            authDomain: "scratch-vault-001.firebaseapp.com",
            projectId: "scratch-vault-001",
            storageBucket: "scratch-vault-001.firebasestorage.app",
            messagingSenderId: "1031351262946",
            appId: "1:1031351262946:web:5e4a10c660e864558bc8bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const dataRows = document.getElementById('data-rows');
        const searchInput = document.getElementById('search-input');

        let localCacheData = []; // Pure filtered runtime records ko memory me maintain rakhne ke liye

        // 1. LOGIN TRIGGER FUNCTION
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                alert("Login Failed! Sahi Email aur Password daalein.");
            }
        });

        // 2. LIVE STATE TRACKER
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.style.display = 'none';
                dashboardScreen.style.display = 'block';
                document.getElementById('owner-email').innerText = "Shop ID: " + user.email;
                
                const baseLiveUrl = window.location.href.replace('dashboard.html', 'index.html');
                document.getElementById('shop-url').innerText = baseLiveUrl + "?shop=" + user.email;

                loadShopData(user.email);
            } else {
                loginScreen.style.display = 'block';
                dashboardScreen.style.display = 'none';
            }
        });

        // 3. FETCH SECURE SHOP DATA
        async function loadShopData(shopEmail) {
            dataRows.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Loading coupons...</td></tr>";
            
            try {
                const q = query(
                    collection(db, "customers"), 
                    where("shopId", "==", shopEmail)
                );
                
                const querySnapshot = await getDocs(q);
                let docsArray = [];
                
                querySnapshot.forEach(docSnap => {
                    docsArray.push({
                        docId: docSnap.id, // ID is useful for direct status modification updates
                        ...docSnap.data()
                    });
                });
                
                // Sorting array logic based on execution timestamps
                docsArray.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.seconds : 0;
                    const timeB = b.timestamp ? b.timestamp.seconds : 0;
                    return timeB - timeA;
                });

                localCacheData = docsArray; 
                renderTableUi(localCacheData);

            } catch (error) {
                console.error("Error loading dashboard data: ", error);
                dataRows.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#ef4444;'>Data loading error! Console check karein.</td></tr>";
            }
        }

        // 4. DISPLAY OR RENDERING FUNCTION DATA LAUNCHER
        function renderTableUi(dataset) {
            dataRows.innerHTML = ""; 

            if(dataset.length === 0) {
                dataRows.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#94a3b8;'>Koi record nahi mila.</td></tr>";
                return;
            }

            dataset.forEach(data => {
                const dateObj = data.timestamp ? data.timestamp.toDate() : new Date();
                const formattedDate = dateObj.toLocaleDateString('hi-IN') + " | " + dateObj.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
                
                // Verify status key pattern inside schema documents
                const isClaimed = data.status === "Claimed";

                const row = `
                    <tr>
                        <td style="font-weight:bold; color:#cbd5e1; white-space: nowrap; display: flex; align-items: center;">
                            <!-- Pure Direct Chat Link (No Auto-Text) -->
                            <a href="https://wa.me/91${data.phone}" target="_blank" class="btn-whatsapp" title="WhatsApp par chat karein">💬 Chat</a>
                            ${data.phone}
                        </td>
                        <td style="color:#f59e0b; font-weight:bold;">🎉 ${data.coupon}</td>
                        <td style="color:#94a3b8; font-size:14px; white-space: nowrap;">${formattedDate}</td>
                        <td>
                            <label class="status-label" style="color: ${isClaimed ? '#22c55e' : '#94a3b8'};">
                                <input type="checkbox" class="status-checkbox" data-id="${data.docId}" ${isClaimed ? 'checked disabled' : ''}>
                                <span>${isClaimed ? 'Claimed' : 'Pending'}</span>
                            </label>
                        </td>
                    </tr>
                `;
                dataRows.innerHTML += row;
            });

            // Action bindings for internal tracking toggles
            bindCheckboxTriggers();
        }

        // 5. ATTACH REALTIME EVENT HANDLERS FOR STATUS UPDATES
        function bindCheckboxTriggers() {
            document.querySelectorAll('.status-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', async (event) => {
                    if (event.target.checked) {
                        const targetId = event.target.getAttribute('data-id');
                        
                        // Instantly disable interactions to prevent duplicate execution requests
                        event.target.disabled = true;
                        const textLabel = event.target.nextElementSibling;
                        textLabel.innerText = "Saving... ⏳";

                        try {
                            const targetDocRef = doc(db, "customers", targetId);
                            await updateDoc(targetDocRef, {
                                status: "Claimed"
                            });

                            // Synchronize our master local database object array record parameters
                            const indexedMatch = localCacheData.findIndex(item => item.docId === targetId);
                            if (indexedMatch !== -1) {
                                localCacheData[indexedMatch].status = "Claimed";
                            }

                            textLabel.innerText = "Claimed";
                            event.target.parentElement.style.color = "#22c55e";

                        } catch (err) {
                            console.error("Firestore field transaction error:", err);
                            alert("Oops! Coupon status database me update nahi ho paya.");
                            event.target.checked = false;
                            event.target.disabled = false;
                            textLabel.innerText = "Pending";
                        }
                    }
                });
            });
        }

        // 6. INSTANT INTERACTIVE LOCAL SEARCH BAR CONTROLLER
        searchInput.addEventListener('input', (event) => {
            const criteria = event.target.value.trim().toLowerCase();
            
            if (!criteria) {
                renderTableUi(localCacheData);
                return;
            }

            const cleanDataset = localCacheData.filter(record => {
                const matchesPhone = record.phone ? record.phone.toLowerCase().includes(criteria) : false;
                const matchesCoupon = record.coupon ? record.coupon.toLowerCase().includes(criteria) : false;
                return matchesPhone || matchesCoupon;
            });

            renderTableUi(cleanDataset);
        });

        // 7. LOGOUT ACTION
        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });
    </script>
</body>
</html>
